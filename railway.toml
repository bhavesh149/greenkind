# @greenkind/api (Nest) only. If you also deploy the Next app on Railway, use [railway.web.toml](railway.web.toml) for the *web* service (see docs/RAILWAY.md).
# https://docs.railway.com/deploy/config-as-code
# Docker build: Railpack/Nixpacks can omit `apps/api/dist` in the run image; [Dockerfile.api](Dockerfile.api) keeps it.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"

[deploy]
preDeployCommand = "/bin/sh -c 'cd /app && pnpm --filter @greenkind/api run db:migrate:deploy'"
startCommand = "node /app/apps/api/dist/src/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
